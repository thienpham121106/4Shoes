<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="shop.css/checkout.css">
</head>
<body>
    <div class="container-checkout">
    <div class="left-checkout">
        <h2>NEO SPORT</h2>
        <div class="link">
            <a href="">Giỏ hàng</a>
            <p>></p>
            <p>Thông tin giao hàng</p>
            <p>></p>
            <p>Phương thức thanh toán</p>
        </div>
        <p class="ttgiaohang">Thông tin giao hàng</p>
        <span>Bạn đã có tài khoản?<strong> Đăng nhập</strong></span>
        <div class="form-info">
            <input type="text" value="Họ và tên">
            <div class="email-phone">
                <input class="email" type="text" value="Email">
                <input class="phone" type="text" value="Số điện thoại">
            </div>
      <textarea placeholder="Số nhà, đường, phường, quận..."></textarea>

      <select>
        <option selected>Địa chỉ mặc định</option>
        <option>123 Nguyễn Huệ, Quận 1, TP.HCM</option>
        <option>456 Lý Thường Kiệt, Quận 10, TP.HCM</option>
        <option>789 Hai Bà Trưng, Quận 3, TP.HCM</option>
        <option>+ Thêm địa chỉ mới...</option>
      </select>
        </div>
    </div>

    <div class="right-checkout">
        <div class="product-checkout">
            <!-- <img src="./images/index-product/pd1.jpg" alt="">
            <div class="name-size">
                <p class="name">Giày Bóng Đá Cỏ Nhân Tạo Mercurial Air Zoom Superfly 9 Elite Cổ Cao Hồng Đế Chuối TF</p>
                <p class="size">43</p>
            </div>
            <div class="price-quantity">
                <p>675,000đ</p>
                <p>x1</p>
            </div> -->
        </div>
      <div class="voucher">
        <label class="voucher-item">
          <input type="checkbox" name="voucher" value="GIAM50K">
          <div class="voucher-info">
            <span class="voucher-code">GIAM50K</span>
            <span class="voucher-desc">Giảm 50.000đ cho đơn hàng trên 300.000đ</span>
          </div>
        </label>

        <label class="voucher-item">
          <input type="checkbox" name="voucher" value="SALE10">
          <div class="voucher-info">
            <span class="voucher-code">SALE10</span>
            <span class="voucher-desc">Giảm 10% (Tối đa 70.000đ)</span>
          </div>
        </label>

        <label class="voucher-item">
          <input type="checkbox" name="voucher" value="FREESHIP">
          <div class="voucher-info">
            <span class="voucher-code">FREESHIP</span>
            <span class="voucher-desc">Miễn phí vận chuyển</span>
          </div>
        </label>
      </div>
      <div class="container-tamtinh">
      <div class="tamtinh">
        <p>Tạm tính</p>
        <span>1,350,000đ</span>
      </div>
      <div class="ship">
        <p>Phí vận chuyển</p>
        <span>30,000đ</span>
      </div>
      </div>
    <div class="total">
        <p class="sub-total">Tổng cộng</p>
        <p class="vnd">VND <span>1,350,000đ</span></p>
    </div>
    <button class="checkout-btn">THANH TOÁN</button>
    </div>
    </div>
    <script src="checkout.js"></script>
</body>
</html>
